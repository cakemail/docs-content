name: Translation Sync

on:
  push:
    branches: [main]
    paths:
      - 'en/**/*.md'
      - 'fr/**/*.md'
      - 'fr-ca/**/*.md'
      - 'es/**/*.md'

jobs:
  detect-and-create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect source article changes and create translation issues
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            // Get changed .md files in this push
            const diff = execSync('git diff --name-only HEAD~1 HEAD -- "*.md"', { encoding: 'utf-8' });
            const changedFiles = diff.trim().split('\n').filter(Boolean);

            for (const file of changedFiles) {
              // Read frontmatter from the changed file
              if (!fs.existsSync(file)) continue;
              const content = fs.readFileSync(file, 'utf-8');

              // Parse frontmatter
              const fmMatch = content.match(/^---\n([\s\S]*?)\n---/);
              if (!fmMatch) continue;

              const frontmatter = fmMatch[1];

              // Skip translations — they have a "source:" field
              if (frontmatter.includes('source:')) continue;

              // Extract translate_to languages
              const translateMatch = frontmatter.match(/translate_to:\s*\[([^\]]*)\]/);
              if (!translateMatch) continue;

              const targetLangs = translateMatch[1].split(',').map(l => l.trim()).filter(Boolean);
              if (targetLangs.length === 0) continue;

              // Get the source language from the file path
              const sourceLang = file.split('/')[0];

              // Get the commit SHA
              const commitSha = execSync('git rev-parse HEAD', { encoding: 'utf-8' }).trim();

              // Extract title from frontmatter
              const titleMatch = frontmatter.match(/title:\s*"?([^"\n]*)"?/);
              const title = titleMatch ? titleMatch[1] : path.basename(file, '.md');

              for (const lang of targetLangs) {
                // Build the translation file path
                const translationPath = file.replace(new RegExp(`^${sourceLang}/`), `${lang}/`);

                // Check if a translation-update issue already exists for this file+lang
                const existingIssues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: 'translation-update',
                  state: 'open',
                });

                const alreadyExists = existingIssues.data.some(issue =>
                  issue.body && issue.body.includes(file) && issue.body.includes(`**Target language:** ${lang}`)
                );

                if (alreadyExists) {
                  console.log(`Skipping ${file} → ${lang}: open issue already exists`);
                  continue;
                }

                // Create the translation issue
                const issueBody = `## Translation Update

**Source file:** ${file}
**Target language:** ${lang}
**Translation file:** ${translationPath}
**Source commit:** ${commitSha}
**Source title:** ${title}

The source article was updated. Please update the ${lang} translation to match.

@claude Translate the source article at \`${file}\` (commit ${commitSha.substring(0, 7)}) to ${lang}. Write the translation to \`${translationPath}\`. Follow the translation instructions in \`.claude/CLAUDE.md\` and use the appropriate translator agent.`;

                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[Translation] Update ${lang} translation: ${title}`,
                  body: issueBody,
                  labels: ['translation-update'],
                });

                console.log(`Created translation issue: ${file} → ${lang}`);
              }
            }
